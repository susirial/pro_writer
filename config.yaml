system:
  app_name: "novel_agent_system"
  log_level: "INFO"
  log_file: "logs/system.log"
  base_dir: "."
  output_dir: "output"
  max_retries: 3
  max_rewrites: 3

model:
  agent:
    provider: ${MODEL_AGENT_PROVIDER:openai}
    name: ${MODEL_AGENT_NAME:doubao-seed-1-6-250615}
    api_base: ${MODEL_AGENT_API_BASE:https://ark.cn-beijing.volces.com/api/v3/}
    api_key: ${MODEL_AGENT_API_KEY}
    timeout: ${MODEL_AGENT_TIMEOUT:60}
    max_retries: ${MODEL_AGENT_MAX_RETRIES:3}

models:
  writer:
    model_name: ${MODEL_WRITER_NAME:}
    temperature: ${MODEL_WRITER_TEMPERATURE:0.7}
    provider: ${MODEL_WRITER_PROVIDER:}
    api_base: ${MODEL_WRITER_API_BASE:}
    api_key: ${MODEL_WRITER_API_KEY:}
    timeout: ${MODEL_WRITER_TIMEOUT:}
    max_retries: ${MODEL_WRITER_MAX_RETRIES:}
